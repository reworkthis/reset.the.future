  a, button { cursor: pointer !important; }

  .landing {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--white);
  }

  /* ===== TOP BAR ===== */
  .top-bar {
    width: 100%;
    background: var(--white);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 2rem 1.2rem;
    position: relative;
    z-index: 20;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    gap: 0.8rem;
  }

  /* Logo — NO filter, natural image on white background */
  .top-bar-logo img {
    height: clamp(55px, 10vw, 100px);
    width: auto;
    display: block;
  }

  .top-bar-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(0.8rem, 3vw, 2.5rem);
  }

  .top-bar-nav a {
    font-family: 'Oswald', sans-serif;
    font-weight: 300;
    font-size: clamp(0.6rem, 1.3vw, 0.85rem);
    color: var(--black);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    transition: opacity 0.3s;
  }

  .top-bar-nav a:hover { opacity: 0.4; }

  /* ===== MAIN AREA ===== */
  .main-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== MARQUEE — behind photo but visible through transparency ===== */
  .marquee-track {
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    transform: translateY(-50%);
    overflow: hidden;
    z-index: 2;
    pointer-events: none;
  }

  /* Two identical sets side by side for seamless infinite loop */
  .marquee-inner {
    display: flex;
    white-space: nowrap;
    will-change: transform;
    animation: marqueeScroll 20s linear infinite;
  }

  /* Each set contains enough repetitions to fill more than the screen */
  .marquee-set {
    display: flex;
    flex-shrink: 0;
  }

  .marquee-set span {
    font-family: 'Oswald', sans-serif;
    font-weight: 400;
    font-size: clamp(4.5rem, 13vw, 12rem);
    color: var(--black);
    text-transform: uppercase;
    letter-spacing: 0.01em;
    padding: 0 0.15em;
    line-height: 0.9;
    flex-shrink: 0;
  }

  @keyframes marqueeScroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ===== PHOTO — semi-transparent so text shows through ===== */
  .photo-container {
    position: relative;
    width: min(80vw, 860px);
    height: min(60vh, 500px);
    z-index: 5;
    overflow: hidden;
  }

  .photo-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0.85;
    animation: photoDisassemble 5s ease-in-out infinite;
    mix-blend-mode: multiply;
  }

  .photo-container::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    mix-blend-mode: overlay;
    animation: sliceGlitch 5s ease-in-out infinite;
    background: transparent;
  }

  .photo-container::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    animation: invertFlash 5s ease-in-out infinite;
    background: transparent;
    mix-blend-mode: difference;
  }

  @keyframes photoDisassemble {
    0% {
      filter: grayscale(100%) contrast(1.0) brightness(0.95);
      transform: scale(1) translateX(0);
    }
    6% {
      filter: grayscale(100%) contrast(3.0) brightness(0.2);
      transform: scale(1.01) translateX(-2px);
    }
    10% {
      filter: grayscale(100%) contrast(0.5) brightness(1.6);
      transform: scale(1) translateX(3px);
    }
    16% {
      filter: grayscale(100%) contrast(1.2) brightness(0.85);
      transform: scale(1) translateX(0);
    }
    24% {
      filter: grayscale(100%) contrast(4.0) brightness(0.15);
      transform: scale(1.02) translateX(-4px) skewX(-0.5deg);
    }
    28% {
      filter: grayscale(100%) contrast(0.3) brightness(1.8);
      transform: scale(0.99) translateX(2px) skewX(0.3deg);
    }
    34% {
      filter: grayscale(100%) contrast(1.0) brightness(1.0);
      transform: scale(1) translateX(0);
    }
    42% {
      filter: grayscale(100%) contrast(2.5) brightness(0.3);
      transform: scale(1.01) translateX(5px);
    }
    46% {
      filter: grayscale(100%) contrast(0.4) brightness(1.7) invert(0.15);
      transform: scale(1) translateX(-3px) skewX(0.4deg);
    }
    52% {
      filter: grayscale(100%) contrast(1.1) brightness(0.9);
      transform: scale(1) translateX(0);
    }
    60% {
      filter: grayscale(100%) contrast(5.0) brightness(0.1);
      transform: scale(1.03) translateX(-6px) skewX(-0.8deg);
    }
    63% {
      filter: grayscale(100%) contrast(0.6) brightness(1.5);
      transform: scale(0.98) translateX(4px) skewX(0.5deg);
    }
    68% {
      filter: grayscale(100%) contrast(1.5) brightness(0.7);
      transform: scale(1) translateX(0);
    }
    76% {
      filter: grayscale(100%) contrast(3.5) brightness(0.2) invert(0.1);
      transform: scale(1.02) translateX(3px);
    }
    80% {
      filter: grayscale(100%) contrast(0.3) brightness(2.0);
      transform: scale(1) translateX(-2px);
    }
    86% {
      filter: grayscale(100%) contrast(1.8) brightness(0.5);
      transform: scale(1) translateX(0);
    }
    92% {
      filter: grayscale(100%) contrast(2.0) brightness(0.35);
      transform: scale(1.01) translateX(-3px) skewX(-0.3deg);
    }
    100% {
      filter: grayscale(100%) contrast(1.0) brightness(0.95);
      transform: scale(1) translateX(0);
    }
  }

  @keyframes sliceGlitch {
    0%, 100% { clip-path: inset(0); background: transparent; }
    6% { clip-path: inset(30% 0 40% 0); background: rgba(255,255,255,0.15); }
    7% { clip-path: inset(0); background: transparent; }
    24% { clip-path: inset(0); background: transparent; }
    25% { clip-path: inset(60% 0 10% 0); background: rgba(0,0,0,0.2); transform: translateX(8px); }
    26.5% { clip-path: inset(10% 0 70% 0); background: rgba(255,255,255,0.1); transform: translateX(-5px); }
    27.5% { clip-path: inset(0); background: transparent; transform: none; }
    60% { clip-path: inset(0); background: transparent; }
    60.5% { clip-path: inset(45% 0 25% 0); background: rgba(0,0,0,0.25); transform: translateX(10px); }
    61% { clip-path: inset(15% 0 55% 0); background: rgba(255,255,255,0.2); transform: translateX(-8px); }
    62% { clip-path: inset(70% 0 5% 0); background: rgba(0,0,0,0.15); transform: translateX(4px); }
    63% { clip-path: inset(0); background: transparent; transform: none; }
    76% { clip-path: inset(0); background: transparent; }
    76.5% { clip-path: inset(20% 0 50% 0); background: rgba(255,255,255,0.18); transform: translateX(-6px); }
    77.5% { clip-path: inset(0); background: transparent; transform: none; }
  }

  @keyframes invertFlash {
    0%, 100% { background: transparent; }
    6% { background: rgba(255,255,255,0.08); }
    7% { background: transparent; }
    24.5% { background: transparent; }
    25% { background: rgba(255,255,255,0.12); }
    26% { background: transparent; }
    60% { background: transparent; }
    60.5% { background: rgba(255,255,255,0.15); }
    62% { background: transparent; }
    76% { background: transparent; }
    76.3% { background: rgba(255,255,255,0.1); }
    77% { background: transparent; }
  }

  @media (max-width: 700px) {
    .top-bar {
      padding: 1rem 0.8rem 0.8rem;
      gap: 0.6rem;
    }
    .top-bar-logo img {
      height: clamp(40px, 12vw, 60px);
    }
    .top-bar-nav {
      gap: clamp(0.5rem, 2vw, 1rem);
      flex-wrap: wrap;
      justify-content: center;
    }
    .top-bar-nav a {
      font-size: clamp(0.45rem, 2.2vw, 0.6rem);
      letter-spacing: 0.1em;
    }
    .photo-container {
      width: 95vw;
      height: 40vh;
    }
    .marquee-set span {
      font-size: clamp(3rem, 12vw, 6rem);
    }
  }
</style>
