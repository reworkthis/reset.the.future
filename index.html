  a, button, .letter, .marquee-letter { cursor: pointer !important; }

  .landing {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--white);
  }

  /* ===== TOP BAR ===== */
  .top-bar {
    width: 100%;
    background: var(--white);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 2rem 1.2rem;
    position: relative;
    z-index: 20;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    gap: 0.8rem;
  }

  .top-bar-logo img {
    height: clamp(90px, 16vw, 160px);
    width: auto;
    display: block;
  }

  .top-bar-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(0.8rem, 3vw, 2.5rem);
  }

  .top-bar-nav a {
    font-family: 'Oswald', sans-serif;
    font-weight: 300;
    font-size: clamp(0.6rem, 1.3vw, 0.85rem);
    color: var(--black);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    transition: opacity 0.3s;
  }

  .top-bar-nav a:hover { opacity: 0.4; }

  /* ===== MAIN AREA ===== */
  .main-area {
    flex: 1;
    position: relative;
    overflow: visible;
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== MARQUEE — interactive letters ===== */
  .marquee-track {
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    transform: translateY(-50%);
    overflow-x: hidden;
    overflow-y: visible;
    z-index: 2;
    padding: 3rem 0;
  }

  .marquee-inner {
    display: flex;
    white-space: nowrap;
    will-change: transform;
    animation: marqueeScroll 20s linear infinite;
  }

  .marquee-set {
    display: flex;
    flex-shrink: 0;
    align-items: center;
  }

  .marquee-word {
    display: inline-flex;
    flex-shrink: 0;
    padding: 0 0.12em;
  }

  .marquee-letter {
    font-family: 'Oswald', sans-serif;
    font-weight: 400;
    font-size: clamp(4.5rem, 13vw, 12rem);
    color: var(--black);
    text-transform: uppercase;
    line-height: 1.1;
    display: inline-block;
    cursor: pointer !important;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    user-select: none;
    -webkit-user-select: none;
    padding-bottom: 0.05em;
  }

  .marquee-letter.space-after {
    margin-right: 0.2em;
  }

  .marquee-letter.floating {
    color: var(--black);
    text-shadow:
      0 0 15px rgba(0,0,0,0.3),
      0 0 30px rgba(0,0,0,0.15),
      3px 6px 12px rgba(0,0,0,0.25);
    transform: translateY(-30px) scale(1.3) rotate(var(--float-rot));
    z-index: 100;
    position: relative;
  }

  .marquee-letter:hover:not(.floating) {
    transform: translateY(-4px);
    text-shadow: 2px 4px 8px rgba(0,0,0,0.15);
  }

  .marquee-letter.returning {
    transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    transform: translateY(0) scale(1) rotate(0deg);
    text-shadow: none;
    z-index: 2;
  }

  @keyframes marqueeScroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ===== VIDEO CONTAINER ===== */
  .video-container {
    position: relative;
    width: min(80vw, 860px);
    height: min(60vh, 500px);
    z-index: 5;
    overflow: visible;
  }

  .video-container video {
    width: 110%;
    height: 110%;
    object-fit: cover;
    display: block;
    opacity: 0.88;
    mix-blend-mode: multiply;
    margin: -5% 0 0 -5%;
  }

  /* ===== VIDEO TEXT OVERLAYS ===== */
  .text-overlay {
    position: absolute;
    display: flex;
    flex-wrap: wrap;
    z-index: 10;
    pointer-events: auto;
    padding: 0.4em 0;
  }

  .text-overlay-top {
    top: 1%;
    left: 3%;
    right: 3%;
    justify-content: flex-start;
  }

  .text-overlay-bottom {
    bottom: 1%;
    left: 3%;
    right: 3%;
    justify-content: flex-end;
  }

  .text-overlay .letter {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(0.4rem, 1.3vw, 0.8rem);
    color: #c8ff00;
    cursor: pointer !important;
    display: inline-block;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    line-height: 1.6;
    user-select: none;
    -webkit-user-select: none;
    padding-bottom: 0.15em;
  }

  .letter.space {
    width: 0.5em;
    pointer-events: none;
  }

  .letter.floating {
    color: #f0ff44;
    text-shadow:
      0 0 10px #c8ff00,
      0 0 20px #c8ff00,
      0 0 40px rgba(200,255,0,0.5),
      2px 4px 8px rgba(0,0,0,0.4);
    transform: translateY(-25px) scale(1.6) rotate(var(--float-rot));
    z-index: 100;
    filter: brightness(1.3);
  }

  .letter:hover:not(.floating) {
    color: #e0ff33;
    text-shadow: 0 0 6px rgba(200,255,0,0.6), 1px 1px 2px rgba(0,0,0,0.8);
    transform: translateY(-2px);
  }

  .letter.returning {
    transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    color: #c8ff00;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    transform: translateY(0) scale(1) rotate(0deg);
    z-index: 10;
    filter: brightness(1);
  }

  /* ===== MOBILE ===== */
  @media (max-width: 700px) {
    .top-bar {
      padding: 1rem 0.8rem 0.8rem;
      gap: 0.5rem;
    }
    .top-bar-logo img {
      height: clamp(65px, 18vw, 100px);
    }
    .top-bar-nav {
      gap: clamp(0.5rem, 2vw, 1rem);
      flex-wrap: wrap;
      justify-content: center;
    }
    .top-bar-nav a {
      font-size: clamp(0.45rem, 2.2vw, 0.6rem);
      letter-spacing: 0.1em;
    }
    .video-container {
      width: 85vw;
      height: 30vh;
    }
    .marquee-letter {
      font-size: clamp(3rem, 12vw, 6rem) !important;
    }
    .letter {
      font-size: clamp(0.28rem, 1.5vw, 0.45rem) !important;
      line-height: 1.4 !important;
    }
    .letter.floating {
      transform: translateY(-15px) scale(1.3) rotate(var(--float-rot)) !important;
    }
    .marquee-letter.floating {
      transform: translateY(-18px) scale(1.2) rotate(var(--float-rot)) !important;
    }
    .marquee-track {
      padding: 2rem 0;
    }
  }
</style>

<body>

<div class="landing">

  <div class="top-bar">
    <a href="#" class="top-bar-logo">
      <img src="logo_letras.png" alt="Reset the Future">
    </a>
    <nav class="top-bar-nav">
      <a href="#">MUSIC</a>
      <a href="#">MERCH</a>
      <a href="#">ITEMS</a>
      <a href="#">MAGAZINE</a>
      <a href="#">CONTACTO</a>
    </nav>
  </div>

  <div class="main-area">

    <!-- Marquee — built by JS with interactive letters -->
    <div class="marquee-track">
      <div class="marquee-inner" id="marquee-inner"></div>
    </div>

    <div class="video-container">
      <video autoplay muted loop playsinline>
        <source src="video.mp4" type="video/mp4">
      </video>
      <div class="text-overlay text-overlay-top" id="text-top"></div>
      <div class="text-overlay text-overlay-bottom" id="text-bottom"></div>
    </div>

  </div>

</div>

<script>
// Float effect for any letter element
function makeFloatable(el) {
  const rot = (Math.random() - 0.5) * 30;
  el.style.setProperty('--float-rot', rot + 'deg');

  el.addEventListener('click', (e) => {
    e.stopPropagation();
    if (el.classList.contains('floating')) return;

    el.classList.add('floating');

    const returnTime = 2000 + Math.random() * 2000;
    setTimeout(() => {
      el.classList.remove('floating');
      el.classList.add('returning');
      setTimeout(() => el.classList.remove('returning'), 800);
    }, returnTime);
  });
}

// Build video text overlays
function buildVideoText(container, text) {
  text.split('').forEach(char => {
    const el = document.createElement('span');
    el.className = 'letter';
    if (char === ' ') {
      el.classList.add('space');
      el.innerHTML = '&nbsp;';
    } else {
      el.textContent = char;
      makeFloatable(el);
    }
    container.appendChild(el);
  });
}

buildVideoText(document.getElementById('text-top'), "DON'T WORRY, YOUR DREAMS WILL EVENTUALLY DIE");
buildVideoText(document.getElementById('text-bottom'), "IT'S ONLY 2 AM ANYWAY");

// Build marquee with interactive letters
function buildMarqueeSet() {
  const set = document.createElement('div');
  set.className = 'marquee-set';

  const text = 'RESET THE FUTURE';
  // Repeat enough times to fill wide screens
  for (let r = 0; r < 6; r++) {
    const word = document.createElement('span');
    word.className = 'marquee-word';

    text.split('').forEach((char, i) => {
      const el = document.createElement('span');
      el.className = 'marquee-letter';
      if (char === ' ') {
        el.innerHTML = '&nbsp;';
        el.classList.add('space-after');
      } else {
        el.textContent = char;
        makeFloatable(el);
      }
      // Add space after last letter of each word
      if (char !== ' ' && text[i + 1] === ' ') {
        el.classList.add('space-after');
      }
      word.appendChild(el);
    });

    // Add trailing space div
    const spacer = document.createElement('span');
    spacer.className = 'marquee-letter space-after';
    spacer.innerHTML = '&nbsp;';
    word.appendChild(spacer);

    set.appendChild(word);
  }
  return set;
}

const marqueeInner = document.getElementById('marquee-inner');
// Two identical sets for seamless loop
marqueeInner.appendChild(buildMarqueeSet());
marqueeInner.appendChild(buildMarqueeSet());
</script>
