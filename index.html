  a, button, [role="button"], .interactive { cursor: pointer !important; }

  /* ===== LAYOUT ===== */
  .landing {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--white);
  }

  /* ===== TOP BAR — cream, logo letras ===== */
  .top-bar {
    width: 100%;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem 2rem;
    position: relative;
    z-index: 20;
    flex-shrink: 0;
  }

  .top-bar img {
    height: clamp(50px, 8vw, 90px);
    width: auto;
  }

  /* ===== MAIN CONTENT — white, photo + marquee ===== */
  .main-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== PHOTO with animated B&W contrast/brightness sweep ===== */
  .photo-container {
    position: relative;
    width: min(85vw, 900px);
    height: min(65vh, 550px);
    z-index: 5;
    overflow: hidden;
  }

  .photo-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: grayscale(100%) contrast(1.1) brightness(0.9);
    animation: photoSweep 8s ease-in-out infinite;
  }

  @keyframes photoSweep {
    0% {
      filter: grayscale(100%) contrast(1.0) brightness(0.85);
    }
    15% {
      filter: grayscale(100%) contrast(1.4) brightness(0.7);
    }
    30% {
      filter: grayscale(100%) contrast(0.9) brightness(1.15);
    }
    45% {
      filter: grayscale(100%) contrast(1.6) brightness(0.6);
    }
    60% {
      filter: grayscale(100%) contrast(1.1) brightness(1.05);
    }
    75% {
      filter: grayscale(100%) contrast(1.5) brightness(0.75);
    }
    90% {
      filter: grayscale(100%) contrast(0.95) brightness(1.1);
    }
    100% {
      filter: grayscale(100%) contrast(1.0) brightness(0.85);
    }
  }

  /* ===== MARQUEE — single track, bold, visible ===== */
  .marquee-track {
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    transform: translateY(-50%);
    overflow: hidden;
    z-index: 10;
    pointer-events: none;
  }

  .marquee-inner {
    display: flex;
    white-space: nowrap;
    will-change: transform;
    animation: marqueeScroll 12s linear infinite;
  }

  .marquee-inner span {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: clamp(7rem, 22vw, 20rem);
    color: var(--black);
    text-transform: uppercase;
    letter-spacing: -0.01em;
    padding: 0 0.15em;
    line-height: 0.85;
    opacity: 0.18;
    mix-blend-mode: multiply;
  }

  @keyframes marqueeScroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ===== MOBILE ===== */
  @media (max-width: 700px) {
    .top-bar {
      padding: 0.8rem 1rem;
    }
    .top-bar img {
      height: clamp(35px, 10vw, 55px);
    }
    .photo-container {
      width: 95vw;
      height: 45vh;
    }
    .marquee-inner span {
      font-size: clamp(4rem, 18vw, 10rem);
    }
  }
</style>

<div class="landing">

  <!-- Top bar — cream background, logo letras bigger -->
  <div class="top-bar">
    <img src="logo_letras.jpg" alt="Reset the Future">
  </div>

  <!-- Main white area -->
  <div class="main-area">

    <!-- Marquee — single track, bold, visible like AirFunk -->
    <div class="marquee-track">
      <div class="marquee-inner">
        <span>RESET THE FUTURE</span>
        <span>RESET THE FUTURE</span>
        <span>RESET THE FUTURE</span>
        <span>RESET THE FUTURE</span>
        <span>RESET THE FUTURE</span>
        <span>RESET THE FUTURE</span>
      </div>
    </div>

    <!-- B&W photo with animated contrast/brightness sweep -->
    <div class="photo-container">
      <img src="photo.jpg" alt="Reset the Future">
    </div>

  </div>

</div>
