  a, button, [role="button"], .interactive { cursor: pointer !important; }

  /* ===== LAYOUT ===== */
  .landing {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--white);
  }

  /* ===== TOP BAR — white, logo bordo + categories black ===== */
  .top-bar {
    width: 100%;
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 2.5rem;
    position: relative;
    z-index: 20;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }

  .top-bar-logo img {
    height: clamp(60px, 10vw, 110px);
    width: auto;
    /* Bordo tint via CSS filter — shift magenta toward bordo */
    filter: brightness(0.65) sepia(1) hue-rotate(-15deg) saturate(2.5);
  }

  .top-bar-nav {
    display: flex;
    align-items: center;
    gap: clamp(1rem, 3vw, 2.5rem);
  }

  .top-bar-nav a {
    font-family: 'Oswald', sans-serif;
    font-weight: 300;
    font-size: clamp(0.65rem, 1.4vw, 0.9rem);
    color: var(--black);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    transition: opacity 0.3s;
    cursor: pointer !important;
  }

  .top-bar-nav a:hover {
    opacity: 0.5;
  }

  /* ===== MAIN AREA ===== */
  .main-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== PHOTO — dramatic B&W contrast sweep ===== */
  .photo-container {
    position: relative;
    width: min(82vw, 880px);
    height: min(62vh, 520px);
    z-index: 5;
    overflow: hidden;
  }

  .photo-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    animation: photoSweep 6s ease-in-out infinite;
  }

  @keyframes photoSweep {
    0% {
      filter: grayscale(100%) contrast(1.1) brightness(0.9);
    }
    8% {
      filter: grayscale(100%) contrast(2.2) brightness(0.4);
    }
    18% {
      filter: grayscale(100%) contrast(0.8) brightness(1.3);
    }
    28% {
      filter: grayscale(100%) contrast(2.5) brightness(0.3);
    }
    38% {
      filter: grayscale(100%) contrast(1.0) brightness(1.15);
    }
    48% {
      filter: grayscale(100%) contrast(1.8) brightness(0.5);
    }
    58% {
      filter: grayscale(100%) contrast(0.7) brightness(1.4);
    }
    68% {
      filter: grayscale(100%) contrast(2.8) brightness(0.25);
    }
    78% {
      filter: grayscale(100%) contrast(1.2) brightness(1.0);
    }
    88% {
      filter: grayscale(100%) contrast(1.6) brightness(0.65);
    }
    100% {
      filter: grayscale(100%) contrast(1.1) brightness(0.9);
    }
  }

  /* ===== MARQUEE — like AirFunk: thinner weight, smaller, BLACK ===== */
  .marquee-track {
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    transform: translateY(-50%);
    overflow: hidden;
    z-index: 10;
    pointer-events: none;
  }

  .marquee-inner {
    display: flex;
    white-space: nowrap;
    will-change: transform;
    animation: marqueeScroll 8s linear infinite;
  }

  .marquee-inner span {
    font-family: 'Oswald', sans-serif;
    font-weight: 400;
    font-size: clamp(4.5rem, 13vw, 12rem);
    color: var(--black);
    text-transform: uppercase;
    letter-spacing: 0.01em;
    padding: 0 0.2em;
    line-height: 0.9;
    mix-blend-mode: difference;
  }

  @keyframes marqueeScroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ===== MOBILE ===== */
  @media (max-width: 700px) {
    .top-bar {
      flex-direction: column;
      gap: 0.8rem;
      padding: 0.8rem 1rem;
    }
    .top-bar-logo img {
      height: clamp(45px, 12vw, 65px);
    }
    .top-bar-nav {
      gap: clamp(0.6rem, 2.5vw, 1.2rem);
    }
    .top-bar-nav a {
      font-size: clamp(0.5rem, 2.5vw, 0.7rem);
    }
    .photo-container {
      width: 95vw;
      height: 42vh;
    }
    .marquee-inner span {
      font-size: clamp(3rem, 12vw, 6rem);
    }
  }
</style>

        <span>RESET THE FUTURE</span>
        <span>RESET THE FUTURE</span>

    <div class="photo-container">
      <img src="photo.jpg" alt="Reset the Future">
    </div>

  </div>

</div>
